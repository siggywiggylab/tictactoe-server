<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1b1033, #05010f 70%);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding-top: 40px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #ff4ecd, #7b5cff, #4ecdff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 200% center; }
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .statusText {
    font-size: 20px;
    margin-bottom: 6px;
    letter-spacing: 1px;
    color: #d7d1ff;
    min-height: 26px;
    transition: 0.3s;
  }

  #roleBadge, #eloBadge {
    font-size: 14px;
    color: #8a83b0;
    margin-bottom: 6px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    grid-template-rows: repeat(3, 110px);
    gap: 10px;
    justify-content: center;
    margin: 20px auto 0;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(123, 92, 255, 0.25), inset 0 0 20px rgba(255,255,255,0.03);
  }

  .cell {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    font-size: 54px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s, box-shadow 0.2s;
  }
  .cell:hover {
    background: rgba(255,255,255,0.09);
    transform: translateY(-2px) scale(1.03);
  }
  .cell.x { color: #ff4ecd; text-shadow: 0 0 14px #ff4ecd; }
  .cell.o { color: #4ecdff; text-shadow: 0 0 14px #4ecdff; }

  .cell.pop { animation: pop 0.25s ease; }
  @keyframes pop {
    0% { transform: scale(0.3); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .cell.win {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 20px rgba(255,255,255,0.4);
  }

  #resetPanel, #modePanel {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .bigBtn {
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 30px;
    border: 2px solid #7b5cff;
    background: rgba(123,92,255,0.15);
    color: #d7d1ff;
    cursor: pointer;
    transition: 0.25s;
  }
  .bigBtn:hover { background: rgba(123,92,255,0.3); }
  .bigBtn:disabled { opacity: 0.5; cursor: default; }
  .bigBtn.ranked { border-color: #ff4ecd; }

  #nicknameInput {
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 10px;
    border: 2px solid #555;
    background: rgba(255,255,255,0.05);
    color: #fff;
    text-align: center;
    margin-bottom: 16px;
    width: 220px;
  }

  #hint {
    margin-top: 12px;
    font-size: 13px;
    color: #8a83b0;
  }

  #eloChangeText {
    font-size: 15px;
    margin-top: 10px;
    min-height: 20px;
  }
  .elo-up { color: #6bff9e; }
  .elo-down { color: #ff6b6b; }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<!-- Screen 1: pick a nickname -->
<div id="nicknameScreen" class="screen active">
  <div class="statusText">What should we call you?</div>
  <br>
  <input id="nicknameInput" type="text" placeholder="Enter a nickname" maxlength="16">
  <br>
  <button class="bigBtn" id="saveNicknameBtn">Continue</button>
</div>

<!-- Screen 2: lobby / find match -->
<div id="lobbyScreen" class="screen">
  <div class="statusText" id="lobbyStatus">Ready when you are</div>
  <div id="eloBadge"></div>
  <div id="modePanel">
    <button class="bigBtn" id="casualBtn">Casual</button>
    <button class="bigBtn ranked" id="rankedBtn">Ranked</button>
  </div>
  <div id="hint">You'll be paired with the next player looking for the same mode</div>
</div>

<!-- Screen 3: the game -->
<div id="gameScreen" class="screen">
  <div class="statusText" id="gameStatus">Connecting...</div>
  <div id="roleBadge"></div>
  <div id="board"></div>
  <div id="eloChangeText"></div>
  <div id="resetPanel">
    <button class="bigBtn" id="leaveBtn">Back to Lobby</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const nicknameScreen = document.getElementById('nicknameScreen');
  const lobbyScreen = document.getElementById('lobbyScreen');
  const gameScreen = document.getElementById('gameScreen');

  const nicknameInput = document.getElementById('nicknameInput');
  const saveNicknameBtn = document.getElementById('saveNicknameBtn');
  const lobbyStatus = document.getElementById('lobbyStatus');
  const eloBadge = document.getElementById('eloBadge');
  const casualBtn = document.getElementById('casualBtn');
  const rankedBtn = document.getElementById('rankedBtn');
  const leaveBtn = document.getElementById('leaveBtn');

  const boardEl = document.getElementById('board');
  const gameStatus = document.getElementById('gameStatus');
  const roleBadgeEl = document.getElementById('roleBadge');
  const eloChangeText = document.getElementById('eloChangeText');

  function showScreen(screen) {
    [nicknameScreen, lobbyScreen, gameScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  // ---- Persistent identity, no password: a random ID saved in this browser ----
  function getPersistentId() {
    let id = localStorage.getItem('ttt_persistentId');
    if (!id) {
      id = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('ttt_persistentId', id);
    }
    return id;
  }
  const persistentId = getPersistentId();

  const socket = io();
  let myRole = null;
  let myElo = null;
  let currentMode = null;
  let returnTimer = null;

  socket.on('connect', () => {
    const savedNickname = localStorage.getItem('ttt_nickname');
    if (savedNickname) {
      identify(savedNickname);
    } else {
      showScreen(nicknameScreen);
    }
  });

  function identify(nickname) {
    socket.emit('identify', { persistentId, nickname });
  }

  socket.on('identified', ({ elo }) => {
    myElo = elo;
    eloBadge.textContent = `Your rating: ${myElo}`;
    showScreen(lobbyScreen);
  });

  saveNicknameBtn.addEventListener('click', () => {
    const name = nicknameInput.value.trim();
    if (!name) return;
    localStorage.setItem('ttt_nickname', name);
    identify(name);
  });
  nicknameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveNicknameBtn.click();
  });

  function findMatch(mode) {
    socket.emit('findMatch', mode);
    casualBtn.disabled = true;
    rankedBtn.disabled = true;
    lobbyStatus.textContent = `Looking for a ${mode} opponent...`;
  }
  casualBtn.addEventListener('click', () => findMatch('casual'));
  rankedBtn.addEventListener('click', () => findMatch('ranked'));

  socket.on('queued', ({ mode }) => {
    lobbyStatus.textContent = `Looking for a ${mode} opponent...`;
  });

  socket.on('matchFound', ({ role, opponent, mode, myElo: elo, opponentElo }) => {
    myRole = role;
    currentMode = mode;
    const modeLabel = mode === 'ranked' ? 'Ranked' : 'Casual';
    roleBadgeEl.textContent = mode === 'ranked'
      ? `${modeLabel} — You are ${role} — vs ${opponent} (${opponentElo}) — your rating ${elo}`
      : `${modeLabel} — You are ${role} — vs ${opponent}`;
    eloChangeText.textContent = '';
    casualBtn.disabled = false;
    rankedBtn.disabled = false;
    lobbyStatus.textContent = 'Ready when you are';
    showScreen(gameScreen);
  });

  // Build the 9 cells once
  const cellEls = [];
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell empty';
    cell.addEventListener('click', () => socket.emit('makeMove', i));
    boardEl.appendChild(cell);
    cellEls.push(cell);
  }

  socket.on('state', (state) => {
    render(state);
  });

  function render(state) {
    state.board.forEach((value, i) => {
      const cell = cellEls[i];
      const hadValue = cell.textContent !== '';
      cell.textContent = value || '';
      cell.className = 'cell';
      if (value) {
        cell.classList.add(value.toLowerCase());
        if (!hadValue) {
          cell.classList.add('pop');
          cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
        }
      } else {
        cell.classList.add('empty');
      }
    });

    if (state.gameOver) {
      let resultText;
      if (state.winner === null) {
        resultText = "It's a draw!";
      } else if (state.winner === myRole) {
        resultText = state.reason === 'forfeit' ? 'Your opponent left — you win!' : 'You win! 🎉';
      } else {
        resultText = state.reason === 'forfeit' ? 'You left the match' : 'You lose';
      }
      gameStatus.textContent = resultText;

      if (state.winLine) {
        state.winLine.forEach(idx => cellEls[idx].classList.add('win'));
      }

      if (state.eloChange && myRole) {
        const mine = state.eloChange[myRole];
        const delta = mine.new - mine.old;
        const sign = delta > 0 ? '+' : '';
        eloChangeText.textContent = `Rating: ${mine.old} → ${mine.new} (${sign}${delta})`;
        eloChangeText.className = delta > 0 ? 'elo-up' : (delta < 0 ? 'elo-down' : '');
        myElo = mine.new;
      }

      // Auto-return to the lobby after a few seconds
      clearTimeout(returnTimer);
      returnTimer = setTimeout(() => {
        socket.emit('leaveRoom');
        eloBadge.textContent = `Your rating: ${myElo}`;
        showScreen(lobbyScreen);
      }, 3000);
    } else {
      const turnName = state.names[state.currentPlayer];
      gameStatus.textContent = `${turnName}'s turn (${state.currentPlayer})`;
    }
  }

  leaveBtn.addEventListener('click', () => {
    clearTimeout(returnTimer);
    socket.emit('leaveRoom');
    eloBadge.textContent = `Your rating: ${myElo}`;
    showScreen(lobbyScreen);
  });
</script>

</body>
</html>
