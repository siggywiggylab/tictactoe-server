<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: radial-gradient(circle at top, #1b1033, #05010f 70%);
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    padding-top: 40px;
    overflow-x: hidden;
  }

  h1 {
    font-size: 42px;
    margin-bottom: 4px;
    background: linear-gradient(90deg, #ff4ecd, #7b5cff, #4ecdff);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer {
    to { background-position: 200% center; }
  }

  .screen { display: none; }
  .screen.active { display: block; }

  #status {
    font-size: 20px;
    margin-bottom: 6px;
    letter-spacing: 1px;
    color: #d7d1ff;
    min-height: 26px;
    transition: 0.3s;
  }

  #roleBadge {
    font-size: 14px;
    color: #8a83b0;
    margin-bottom: 25px;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(3, 110px);
    grid-template-rows: repeat(3, 110px);
    gap: 10px;
    justify-content: center;
    margin: 0 auto;
    padding: 14px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(123, 92, 255, 0.25), inset 0 0 20px rgba(255,255,255,0.03);
  }

  .cell {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    font-size: 54px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s, box-shadow 0.2s;
  }
  .cell:hover {
    background: rgba(255,255,255,0.09);
    transform: translateY(-2px) scale(1.03);
  }
  .cell.x { color: #ff4ecd; text-shadow: 0 0 14px #ff4ecd; }
  .cell.o { color: #4ecdff; text-shadow: 0 0 14px #4ecdff; }

  .cell.pop { animation: pop 0.25s ease; }
  @keyframes pop {
    0% { transform: scale(0.3); opacity: 0; }
    70% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .cell.win {
    background: rgba(255,255,255,0.15);
    box-shadow: 0 0 20px rgba(255,255,255,0.4);
  }

  #resetPanel {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .bigBtn {
    padding: 14px 28px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 30px;
    border: 2px solid #7b5cff;
    background: rgba(123,92,255,0.15);
    color: #d7d1ff;
    cursor: pointer;
    transition: 0.25s;
  }
  .bigBtn:hover { background: rgba(123,92,255,0.3); }
  .bigBtn:disabled { opacity: 0.5; cursor: default; }

  #nicknameInput {
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 10px;
    border: 2px solid #555;
    background: rgba(255,255,255,0.05);
    color: #fff;
    text-align: center;
    margin-bottom: 16px;
    width: 220px;
  }

  #hint {
    margin-top: 12px;
    font-size: 13px;
    color: #8a83b0;
  }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="nicknameScreen" class="screen active">
  <div id="status">What should we call you?</div>
  <br>
  <input id="nicknameInput" type="text" placeholder="Enter a nickname" maxlength="16">
  <br>
  <button class="bigBtn" id="saveNicknameBtn">Continue</button>
</div>

<div id="lobbyScreen" class="screen">
  <div id="lobbyStatus">Ready when you are</div>
  <div id="resetPanel">
    <button class="bigBtn" id="findMatchBtn">Find Match</button>
  </div>
  <div id="hint">You'll be paired with the next player who's also looking for a match</div>
</div>

<div id="gameScreen" class="screen">
  <div id="status">Connecting...</div>
  <div id="roleBadge"></div>
  <div id="board"></div>
  <div id="resetPanel">
    <button class="bigBtn" id="leaveBtn">Back to Lobby</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const nicknameScreen = document.getElementById('nicknameScreen');
  const lobbyScreen = document.getElementById('lobbyScreen');
  const gameScreen = document.getElementById('gameScreen');

  const nicknameInput = document.getElementById('nicknameInput');
  const saveNicknameBtn = document.getElementById('saveNicknameBtn');
  const lobbyStatus = document.getElementById('lobbyStatus');
  const findMatchBtn = document.getElementById('findMatchBtn');
  const leaveBtn = document.getElementById('leaveBtn');

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const roleBadgeEl = document.getElementById('roleBadge');

  function showScreen(screen) {
    [nicknameScreen, lobbyScreen, gameScreen].forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function getPersistentId() {
    let id = localStorage.getItem('ttt_persistentId');
    if (!id) {
      id = 'p_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
      localStorage.setItem('ttt_persistentId', id);
    }
    return id;
  }
  const persistentId = getPersistentId();

  const socket = io();
  let myRole = null;

  socket.on('connect', () => {
    const savedNickname = localStorage.getItem('ttt_nickname');
    if (savedNickname) {
      identify(savedNickname);
      showScreen(lobbyScreen);
    } else {
      showScreen(nicknameScreen);
    }
  });

  function identify(nickname) {
    socket.emit('identify', { persistentId, nickname });
  }

  saveNicknameBtn.addEventListener('click', () => {
    const name = nicknameInput.value.trim();
    if (!name) return;
    localStorage.setItem('ttt_nickname', name);
    identify(name);
    showScreen(lobbyScreen);
  });
  nicknameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveNicknameBtn.click();
  });

  findMatchBtn.addEventListener('click', () => {
    socket.emit('findMatch');
    findMatchBtn.disabled = true;
    lobbyStatus.textContent = 'Looking for an opponent...';
  });

  socket.on('queued', () => {
    lobbyStatus.textContent = 'Looking for an opponent...';
  });

  socket.on('matchFound', ({ role, opponent }) => {
    myRole = role;
    roleBadgeEl.textContent = `You are ${role} — playing against ${opponent}`;
    findMatchBtn.disabled = false;
    lobbyStatus.textContent = 'Ready when you are';
    showScreen(gameScreen);
  });

  const cellEls = [];
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell empty';
    cell.addEventListener('click', () => socket.emit('makeMove', i));
    boardEl.appendChild(cell);
    cellEls.push(cell);
  }

  socket.on('state', (state) => {
    render(state);
  });

  function render(state) {
    state.board.forEach((value, i) => {
      const cell = cellEls[i];
      const hadValue = cell.textContent !== '';
      cell.textContent = value || '';
      cell.className = 'cell';
      if (value) {
        cell.classList.add(value.toLowerCase());
        if (!hadValue) {
          cell.classList.add('pop');
          cell.addEventListener('animationend', () => cell.classList.remove('pop'), { once: true });
        }
      } else {
        cell.classList.add('empty');
      }
    });

    if (state.gameOver) {
      if (state.winner) {
        const winnerName = state.names[state.winner];
        statusEl.textContent = `${winnerName} (${state.winner}) wins! \u{1F389}`;
        state.winLine.forEach(idx => cellEls[idx].classList.add('win'));
      } else {
        statusEl.textContent = "It's a draw!";
      }
    } else {
      const turnName = state.names[state.currentPlayer];
      statusEl.textContent = `${turnName}'s turn (${state.currentPlayer})`;
    }
  }

  socket.on('opponentLeft', () => {
    statusEl.textContent = 'Your opponent left the game';
  });

  leaveBtn.addEventListener('click', () => {
    socket.emit('leaveRoom');
    showScreen(lobbyScreen);
  });
</script>

</body>
</html>
